[workspace]
members = [".", "crates/regenerator-core", "crates/regenerator-tui"]
resolver = "3"

[package]
authors = ["Ricardo Quesada <ricardoquesada@gmail.com>"]
description = "An interactive disassembler for the CPU 6502, focused mostly on Commodore 8-bit computers."
name = "regenerator2000"
version = "0.8.8"
edition = "2024"

[dependencies]
regenerator-core = { path = "crates/regenerator-core", features = ["mcp"] }
regenerator-tui = { path = "crates/regenerator-tui" }
clap = { version = "4", features = ["derive"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
ratatui = "0.30.0"
crossterm = "0.29"
base64 = "0.22.1"
log = "0.4.29"
simplelog = "0.12.2"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "sync", "net", "macros"] }

[build-dependencies]
anyhow = "1.0"
vergen = "9.1.0"
vergen-gitcl = "9.1.0"

[lints.clippy]
# Stability: flag panic-inducing patterns during development
unwrap_used = "warn"
panic = "warn"
expect_used = "warn"
