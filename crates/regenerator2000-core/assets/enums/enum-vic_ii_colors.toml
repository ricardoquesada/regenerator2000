name = "VicIIColors"
description = "Color constants for the Commodore 64/128 (VIC-II) video chip."

[variants]
"0" = "BLACK"
"1" = "WHITE"
"2" = "RED"
"3" = "CYAN"
"4" = "PURPLE"
"5" = "GREEN"
"6" = "BLUE"
"7" = "YELLOW"
"8" = "ORANGE"
"9" = "BROWN"
"10" = "LIGHT_RED"
"11" = "DARK_GREY"
"12" = "GREY"
"13" = "LIGHT_GREEN"
"14" = "LIGHT_BLUE"
"15" = "LIGHT_GREY"
